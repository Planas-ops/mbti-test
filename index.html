<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵魂探测器 - 你的MBTI人格密码</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MBTI人物元素 -->
    <div class="character character-1">👨‍💼</div>
    <div class="character character-2">👩‍🎨</div>
    <div class="character character-3">👨‍🔬</div>
    <div class="character character-4">👩‍🚀</div>
    <div class="character character-5">👨‍🏫</div>
    <div class="character character-6">👩‍⚕️</div>
    <div class="character character-7">👨‍🎤</div>
    <div class="character character-8">👩‍💻</div>
    <div class="character character-9">👨‍🍳</div>
    <div class="character character-10">👩‍🔧</div>
    <div class="character character-11">👨‍✈️</div>
    <div class="character character-12">👩‍🚒</div>
    <div class="character character-13">👨‍🌾</div>
    <div class="character character-14">👩‍🏫</div>
    <div class="character character-15">👨‍⚕️</div>
    <div class="character character-16">👩‍🎤</div>

    <!-- 色彩装饰 -->
    <div class="color-dot dot-1"></div>
    <div class="color-dot dot-2"></div>
    <div class="color-dot dot-3"></div>
    <div class="color-dot dot-4"></div>
    <div class="color-dot dot-5"></div>
    <div class="color-dot dot-6"></div>

    <!-- 渐变圆圈 -->
    <div class="gradient-circle circle-1"></div>
    <div class="gradient-circle circle-2"></div>
    <div class="gradient-circle circle-3"></div>

    <!-- 浮动标签 -->
    <div class="floating-tags">
        <div class="tag tag-1">INTJ</div>
        <div class="tag tag-2">ENFP</div>
        <div class="tag tag-3">ISTJ</div>
        <div class="tag tag-4">ENTP</div>
        <div class="tag tag-5">ISFJ</div>
        <div class="tag tag-6">ESTP</div>
        <div class="tag tag-7">INFJ</div>
        <div class="tag tag-8">ESFP</div>
    </div>

    <div class="container">
        <!-- 开始页面 -->
        <div id="start-screen" class="screen active">
            <div class="logo">🔮</div>
            <h1>灵魂探测器</h1>
            <p class="subtitle">解锁你的MBTI人格密码</p>
            <p class="description">20道灵魂拷问，揭示你内心深处的16种人格类型</p>
            <button class="btn-primary" onclick="startTest()">开始测试</button>
        </div>

        <!-- 测试页面 -->
        <div id="test-screen" class="screen">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="progress-text" id="progress-text">1/10</span>
            </div>

            <div class="question-card">
                <h2 id="question-text"></h2>
                <div class="options">
                    <button class="option" id="option-a" onclick="selectOption('A')"></button>
                    <button class="option" id="option-b" onclick="selectOption('B')"></button>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-screen" class="screen">
            <div class="result-card">
                <div class="personality-type" id="personality-type"></div>
                <h2 id="result-title"></h2>
                <p class="result-description" id="result-description"></p>

                <div class="traits">
                    <div class="trait">
                        <span class="trait-label">外向(E) - 内向(I)</span>
                        <div class="trait-bar">
                            <div class="trait-progress" id="ei-bar"></div>
                        </div>
                    </div>
                    <div class="trait">
                        <span class="trait-label">实感(S) - 直觉(N)</span>
                        <div class="trait-bar">
                            <div class="trait-progress" id="sn-bar"></div>
                        </div>
                    </div>
                    <div class="trait">
                        <span class="trait-label">思考(T) - 情感(F)</span>
                        <div class="trait-bar">
                            <div class="trait-progress" id="tf-bar"></div>
                        </div>
                    </div>
                    <div class="trait">
                        <span class="trait-label">判断(J) - 感知(P)</span>
                        <div class="trait-bar">
                            <div class="trait-progress" id="jp-bar"></div>
                        </div>
                    </div>
                </div>

                <button class="btn-secondary" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
